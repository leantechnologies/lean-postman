<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="" />
    <title>Connect | Link SDK Demo App</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
      crossorigin="anonymous"
    />

    <meta name="theme-color" content="#081717" />

    <style>
      html,
      body {
        height: 100%;
      }

      .cover-container {
        display: -ms-flexbox;
        display: flex;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        background-color: #19e9e9;
      }

      .cover-container a,
      .cover-container a:focus,
      .cover-container a:hover {
        color: #fff;
      }

      .cover-container .btn-secondary,
      .cover-container .btn-secondary:hover,
      .cover-container .btn-secondary:focus {
        color: #333;
        text-shadow: none; /* Prevent inheritance from `body` */
        background-color: #fff;
        border: 0.05rem solid #fff;
      }

      /*
 * Header
 */
      .cover-heading {
        margin-bottom: 3rem;
      }

      .masthead-brand {
        margin-bottom: 0;
      }

      .nav-masthead .nav-link {
        padding: 0.25rem 0;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.5);
        background-color: transparent;
        border-bottom: 0.25rem solid transparent;
      }

      .nav-masthead .nav-link:hover,
      .nav-masthead .nav-link:focus {
        border-bottom-color: rgba(255, 255, 255, 0.25);
      }

      .nav-masthead .nav-link + .nav-link {
        margin-left: 1rem;
      }

      .nav-masthead .active {
        color: #fff;
        border-bottom-color: #fff;
      }

      .masthead-brand {
        float: left;
      }
      .nav-masthead {
        float: right;
      }

      /*
 * Cover
 */
      .cover {
        padding: 0 1.5rem;
      }
      .cover .btn-lg {
        padding: 0.75rem 1.25rem;
        font-weight: 700;
        width: 100%;
        max-width: 300px;
      }

      /*
 * Footer
 */
      .mastfoot {
        color: rgba(255, 255, 255, 0.5);
      }

      .logo {
        height: 60px;
        margin-top: -9px;
      }
    </style>
  </head>
  <body>
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="masthead mb-auto">
        <div class="inner">
          <h3 class="masthead-brand">
            <img
              alt="Lean tech logo"
              class="logo"
              src="https://cdn.leantech.me/img/logo/SVG/lean-gear-green-circle-01.svg"
            />
            <span>Lean | Link SDK</span>
          </h3>
          <nav class="nav nav-masthead justify-content-center">
            <a class="nav-link active" href="https://www.leantech.me">Home</a>
          </nav>
        </div>
      </header>

      <main role="main" class="inner cover">
        <h1 class="cover-heading">Link SDK Demo</h1>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="link();"
          >
            Link
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="connect();"
          >
            Connect
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="reconnect();"
          >
            Reconnect
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="createPaymentSource();"
          >
            Create payment source
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="updatePaymentSource();"
          >
            Update Payment Source
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="pay();"
          >
            Initiate payment
          </button>
        </p>
      </main>

      <footer class="mastfoot mt-auto">
        <div class="inner"></div>
      </footer>
    </div>

    <div id="lean-link"></div><script src="https://cdn.leantech.me/link/sdk/web/staging/sa/latest/Lean.min.js"></script>
  </body>
  <script>

    const app_token= "9ac6a376-71cb-4412-9a6e-49e9fffdce04";
    const customer_id= "5e6b6601-008d-4340-9a73-cf10e7609709";

    function cb(state) {
      console.log(state);
    }

    function link() {
      Lean.link({
        app_token: "68d74086-3b41-4b9f-b873-029ed97ad7bb",
        customer_id: "bfd88eb4-6c43-405a-ad83-87c2ff2926cb",
        permissions: ["identity", "balance", "accounts", "transactions"],
        sandbox: false,
        fail_redirect_url : "https://www.google.com/search?q=failure",
        success_redirect_url : "https://www.google.com/search?q=success",
      });
    }

    function connect() {
      Lean.connect({
        customer_id: "0dd7704d-f0c8-41fc-8472-dc3de5e1f23f",
        app_token: "1f3b8cc3-8110-490a-a8a2-6ba62f8521ec",
        permissions: ["identity", "balance", "accounts", "transactions"],
        access_from: '2023-09-05',
        access_to: '2023-12-07',
        fail_redirect_url : "https://www.google.com/search?q=failure",
        success_redirect_url : "https://www.google.com/search?q=success",
        sandbox: false,
        //payment_destination_id: "7063b9bd-45ef-4e82-aa90-102801cde9a9",
        // bank_identifier: "ANB_SAU",
        account_type: 'BUSINESS'
      });
    }

    function reconnect() {
      Lean.reconnect({
        app_token,
        reconnect_id: "3e628833-8656-4613-81df-fddcae1a89f1",
        // show_logs: true,
        sandbox: true,
        callback: cb,
      });
    }

    function createPaymentSource() {
      Lean.createPaymentSource({
        app_token,
        customer_id,
        sandbox: false,
        payment_destination_id,
        show_logs: true,
      });
    }

    function updatePaymentSource() {
      Lean.updatePaymentSource({
        app_token,
        customer_id,
        payment_source_id: "7d01b45e-0a77-4e14-bb19-257072fe439f",
        payment_destination_id: "0f6fe273-9218-4729-8762-6d8af2591ba3",
        sandbox: true,
        callback: cb,
      });
    }

    function pay() {
      Lean.pay({
        app_token,
        payment_intent_id: "0c62deb3-5737-4268-8bd4-d55d5d56e5b1",
        sandbox: true,
        callback: cb,
      });
    }
  </script>
</html>
