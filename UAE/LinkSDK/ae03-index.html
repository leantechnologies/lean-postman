<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="" />
    <title>Connect | Link SDK Demo App</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
      crossorigin="anonymous"
    />

    <meta name="theme-color" content="#081717" />

    <style>
      html,
      body {
        height: 100%;
      }

      .cover-container {
        display: -ms-flexbox;
        display: flex;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        background-color: #19e9e9;
      }

      .cover-container a,
      .cover-container a:focus,
      .cover-container a:hover {
        color: #fff;
      }

      .cover-container .btn-secondary,
      .cover-container .btn-secondary:hover,
      .cover-container .btn-secondary:focus {
        color: #333;
        text-shadow: none; /* Prevent inheritance from `body` */
        background-color: #fff;
        border: 0.05rem solid #fff;
      }

      /*
 * Header
 */
      .cover-heading {
        margin-bottom: 3rem;
      }

      .masthead-brand {
        margin-bottom: 0;
      }

      .nav-masthead .nav-link {
        padding: 0.25rem 0;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.5);
        background-color: transparent;
        border-bottom: 0.25rem solid transparent;
      }

      .nav-masthead .nav-link:hover,
      .nav-masthead .nav-link:focus {
        border-bottom-color: rgba(255, 255, 255, 0.25);
      }

      .nav-masthead .nav-link + .nav-link {
        margin-left: 1rem;
      }

      .nav-masthead .active {
        color: #fff;
        border-bottom-color: #fff;
      }

      .masthead-brand {
        float: left;
      }
      .nav-masthead {
        float: right;
      }

      /*
 * Cover
 */
      .cover {
        padding: 0 1.5rem;
      }
      .cover .btn-lg {
        padding: 0.75rem 1.25rem;
        font-weight: 700;
        width: 100%;
        max-width: 300px;
      }

      /*
 * Footer
 */
      .mastfoot {
        color: rgba(255, 255, 255, 0.5);
      }

      .logo {
        height: 60px;
        margin-top: -9px;
      }
    </style>
  </head>
  <body>
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="masthead mb-auto">
        <div class="inner">
          <h3 class="masthead-brand">
            <img
              alt="Lean tech logo"
              class="logo"
              src="https://cdn.leantech.me/img/logo/SVG/lean-gear-green-circle-01.svg"
            />
            <span>Lean | Link SDK</span>
          </h3>
          <nav class="nav nav-masthead justify-content-center">
            <a class="nav-link active" href="https://www.leantech.me">Home</a>
          </nav>
        </div>
      </header>

      <main role="main" class="inner cover">
        <h1 class="cover-heading">Link SDK Demo</h1>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="link();"
          >
            Link
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="connect();"
          >
            Connect
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="reconnect();"
          >
            Reconnect
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="createPaymentSource();"
          >
            Create payment source
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="updatePaymentSource();"
          >
            Update Payment Source
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="pay();"
          >
            Initiate payment
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="authorise();"
          >
            Authorise payment
          </button>
        </p>
        <p class="lead">
          <button
            class="btn btn-lg btn-secondary"
            type="button"
            onclick="createBeneficiary();"
          >
            Create Beneficiary
          </button>
        </p>
      </main>

      <footer class="mastfoot mt-auto">
        <div class="inner"></div>
      </footer>
    </div>
    
    <div id="lean-link"></div><script src="https://cdn.leantech.me/link/sdk/web/dev/ae/latest/Lean.min.js"></script>

    <!-- Staging -->
    <!--<script src="https://cdn.leantech.me/staging/link/sdk/web/latest/Lean.min.js"></script>-->
    <!-- <script src="https://cdn.leantech.me/staging/link/sdk/web/1.2.4/Lean.min.js"></script> -->

    <!-- Prod -->
    <!-- <script src="https://cdn.leantech.me/link/sdk/web/latest/Lean.min.js"></script> -->
    <!-- <script src="https://cdn.leantech.me/link/sdk/web/1.5.1/Lean.min.js"></script> -->

  </body>
  <script>
    const customer_id= "5e6b6601-008d-4340-9a73-cf10e7609709";
    const end_user_id= "f05b7212-06b0-409d-9dc4-7086ac5dcba7";

    function cb(state) {
      console.log(state);
    }

    function link() {
      Lean.link({
        app_token,
        customer_id,
        permissions: ["identity", "balance", "accounts", "transactions"],
        sandbox: false,
      });
    }

    function connect() {
      Lean.connect({
        customer_id: '43844c8b-4d46-4bcf-9166-1ae221edd800',
        app_token: '9fb9e934-9efb-4e7e-a508-de67c0839be0',
        permissions: ["identity", "balance", "accounts", "transactions","payments"],
        sandbox: true
      });
    }

    function reconnect() {
      Lean.reconnect({
        app_token,
        reconnect_id: "3e628833-8656-4613-81df-fddcae1a89f1",
        // show_logs: true,
        sandbox: true,
        callback: cb,
      });
    }

    function createPaymentSource() {
      Lean.createPaymentSource({
        app_token,
        customer_id,
        sandbox: false,
        payment_destination_id,
        show_logs: true,
      });
    }

    function updatePaymentSource() {
      Lean.updatePaymentSource({
        app_token,
        customer_id,
        end_user_id,
        payment_source_id: "7d01b45e-0a77-4e14-bb19-257072fe439f",
        payment_destination_id: "0f6fe273-9218-4729-8762-6d8af2591ba3",
        sandbox: true,
        callback: cb,
      });
    }

    function createBeneficiary(){
      Lean.createBeneficiary({
        app_token,
        end_user_id,
        customer_id,
        payment_source_id: "56c724d9-4523-30c6-898f-2160c4d9dd36",
        payment_destination_id: "8b106a21-7fc5-41b6-a228-f2bd59e8adfc",
        sandbox: true,
        callback: cb,
      });
    }

    function pay() {
      Lean.pay({
        app_token,
        payment_intent_id: "0c62deb3-5737-4268-8bd4-d55d5d56e5b1",
        end_user_id: end_user_id,
        sandbox: true,
        callback: cb,
      });
    }

    function authorise() {
      Lean.authorize( {
       app_token,
       customer_id,
       payment_intent_ids: ["b237cfbb-fed3-4fab-b5ae-ec3eb5a9c4d3"],
       end_user_id,
       sandbox: true
     });
    }
  </script>
</html>
